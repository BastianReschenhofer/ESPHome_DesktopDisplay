      - id: page_sensoren
        lambda: |-
          it.fill(Color(0, 0, 0));
          it.print(64, 10, id(font_normal), Color(255, 255, 0), TextAlign::TOP_CENTER, "PLAYER STATS");

          if (id(stats_view_index) == 0) {
            if ((id(anim_tick) / 4) % 2 == 0) {
              it.filled_triangle(120, 10, 115, 5, 115, 15, Color(255, 255, 0));
            }

            auto draw_invader = [&](int x, int y, Color c, bool frame) {
                it.filled_rectangle(x+4, y, 8, 2, c);
                it.filled_rectangle(x+2, y+2, 12, 2, c);
                it.filled_rectangle(x, y+4, 16, 2, c);
                it.filled_rectangle(x, y+6, 4, 2, c); it.filled_rectangle(x+6, y+6, 4, 2, c); it.filled_rectangle(x+12, y+6, 4, 2, c);
                it.filled_rectangle(x, y+8, 16, 2, c);
                it.filled_rectangle(x+4, y+10, 8, 2, c);
                if(frame) {
                    it.filled_rectangle(x, y+12, 4, 2, c); it.filled_rectangle(x+12, y+12, 4, 2, c);
                } else {
                    it.filled_rectangle(x+2, y+12, 4, 2, c); it.filled_rectangle(x+10, y+12, 4, 2, c);
                }
            };

            it.rectangle(4, 30, 120, 50, Color(255, 0, 0));
            draw_invader(10, 34, Color(255, 0, 0), (id(anim_tick)/4)%2==0);
            
            int laser_y = 48 + ((id(anim_tick) * 3) % 40);
            it.filled_rectangle(14, laser_y, 2, 4, Color(255, 0, 0));

            it.print(32, 36, id(font_tiny), Color(255, 255, 0), TextAlign::TOP_LEFT, "STAGE 1: INNEN");
            
            if (id(zimmer_temperatur).has_state()) {
              it.printf(32, 54, id(font_medium), Color(255,255,255), "%.1f C", id(zimmer_temperatur).state);
            } else { it.print(32, 54, id(font_medium), Color(100,100,100), "ERR C"); }
            if (id(zimmer_luftfeuchtigkeit).has_state()) {
              it.printf(85, 54, id(font_medium), Color(0,255,0), "%.0f %%", id(zimmer_luftfeuchtigkeit).state);
            } else { it.print(85, 54, id(font_medium), Color(100,100,100), "ERR %"); }

            it.rectangle(4, 90, 120, 50, Color(0, 0, 255));
            draw_invader(10, 94, Color(0, 0, 255), (id(anim_tick)/4)%2!=0);

            int laser2_y = 108 + ((id(anim_tick) * 3) % 40);
            it.filled_rectangle(14, laser2_y, 2, 4, Color(0, 0, 255));

            it.print(32, 96, id(font_tiny), Color(255, 255, 0), TextAlign::TOP_LEFT, "STAGE 2: AUSSEN");
            
            if (id(aussen_temperatur).has_state()) {
              it.printf(32, 114, id(font_medium), Color(255,255,255), "%.1f C", id(aussen_temperatur).state);
            } else { it.print(32, 114, id(font_medium), Color(100,100,100), "ERR C"); }
            if (id(aussen_luftfeuchtigkeit).has_state()) {
              it.printf(85, 114, id(font_medium), Color(0,255,0), "%.0f %%", id(aussen_luftfeuchtigkeit).state);
            } else { it.print(85, 114, id(font_medium), Color(100,100,100), "ERR %"); }
          } else {
            if ((id(anim_tick) / 4) % 2 == 0) {
              it.filled_triangle(8, 10, 13, 5, 13, 15, Color(255, 255, 0));
            }
            
            it.print(64, 30, id(font_tiny), Color(0, 255, 255), TextAlign::TOP_CENTER, "STAGE 3: WETTER RADAR");
            
            std::string cond = id(wetter_bedingung).has_state() ? id(wetter_bedingung).state : "unknown";
            int cx = 64;
            int cy = 75;
            
            if (cond == "sunny" || cond == "clear-night") {
                it.filled_circle(cx, cy, 14, Color(255, 255, 0));
                if ((id(anim_tick) / 2) % 2 == 0) {
                    it.line(cx, cy - 18, cx, cy - 24, Color(255, 255, 0));
                    it.line(cx, cy + 18, cx, cy + 24, Color(255, 255, 0));
                    it.line(cx - 18, cy, cx - 24, cy, Color(255, 255, 0));
                    it.line(cx + 18, cy, cx + 24, cy, Color(255, 255, 0));
                } else {
                    it.line(cx - 13, cy - 13, cx - 18, cy - 18, Color(255, 255, 0));
                    it.line(cx + 13, cy + 13, cx + 18, cy + 18, Color(255, 255, 0));
                    it.line(cx + 13, cy - 13, cx + 18, cy - 18, Color(255, 255, 0));
                    it.line(cx - 13, cy + 13, cx - 18, cy + 18, Color(255, 255, 0));
                }
                it.print(64, 115, id(font_medium), Color(255, 255, 0), TextAlign::TOP_CENTER, "KLAR");
            } else if (cond == "rainy" || cond == "pouring" || cond == "lightning-rainy") {
                it.filled_circle(cx - 12, cy, 12, Color(100, 100, 100));
                it.filled_circle(cx + 12, cy, 12, Color(100, 100, 100));
                it.filled_circle(cx, cy - 8, 15, Color(100, 100, 100));
                
                int drop = (id(anim_tick) * 4) % 20;
                it.line(cx - 10, cy + 10 + drop, cx - 12, cy + 15 + drop, Color(0, 150, 255));
                it.line(cx, cy + 5 + drop, cx - 2, cy + 10 + drop, Color(0, 150, 255));
                it.line(cx + 10, cy + 10 + drop, cx + 8, cy + 15 + drop, Color(0, 150, 255));
                
                if (cond == "lightning-rainy" && (id(anim_tick) / 3) % 4 == 0) {
                   it.filled_triangle(cx, cy+5, cx+5, cy+15, cx-5, cy+15, Color(255,255,0));
                   it.filled_triangle(cx+2, cy+10, cx+7, cy+25, cx-3, cy+15, Color(255,255,0));
                }
                it.print(64, 115, id(font_medium), Color(0, 150, 255), TextAlign::TOP_CENTER, "REGEN");
            } else if (cond == "cloudy" || cond == "partlycloudy" || cond == "fog") {
                int drift = ((id(anim_tick) / 2) % 10) - 5;
                int px = cx + drift;
                it.filled_circle(px - 12, cy, 12, Color(200, 200, 200));
                it.filled_circle(px + 12, cy, 12, Color(200, 200, 200));
                it.filled_circle(px, cy - 8, 15, Color(200, 200, 200));
                it.print(64, 115, id(font_medium), Color(200, 200, 200), TextAlign::TOP_CENTER, "WOLKIG");
            } else if (cond == "snowy" || cond == "snowy-rainy") {
                it.filled_circle(cx - 12, cy, 12, Color(255, 255, 255));
                it.filled_circle(cx + 12, cy, 12, Color(255, 255, 255));
                it.filled_circle(cx, cy - 8, 15, Color(255, 255, 255));
                
                int drop = (id(anim_tick) * 2) % 20;
                it.filled_rectangle(cx - 10, cy + 10 + drop, 2, 2, Color(0, 255, 255));
                it.filled_rectangle(cx, cy + 5 + drop, 2, 2, Color(0, 255, 255));
                it.filled_rectangle(cx + 10, cy + 10 + drop, 2, 2, Color(0, 255, 255));
                it.print(64, 115, id(font_medium), Color(0, 255, 255), TextAlign::TOP_CENTER, "SCHNEE");
            } else {
                it.print(64, cy, id(font_medium), Color(255, 0, 0), TextAlign::CENTER, "NO SIGNAL");
            }
          }

      - id: page_timer
        lambda: |-
          it.fill(Color(0, 0, 0));
          it.print(64, 20, id(font_normal), Color(0, 255, 0), TextAlign::TOP_CENTER, "TIME LIMIT");
          
          auto draw_pacman_menu = [&](int y) {
            int px = 18; int py = y + 5;
            it.filled_circle(px, py, 4, Color(255, 255, 0));
            if ((id(anim_tick)/2)%2 == 0) {
              it.filled_triangle(px, py, px+6, py-4, px+6, py+4, Color(0,0,0));
            }
          };

          if (id(timer_menu_modus)) {
            if (id(timer_sekunden) > 0) {
              Color c0 = id(timer_menu_index) == 0 ? Color(255, 255, 255) : Color(0, 255, 0);
              Color c1 = id(timer_menu_index) == 1 ? Color(255, 255, 255) : Color(0, 255, 0);
              Color c2 = id(timer_menu_index) == 2 ? Color(255, 255, 255) : Color(0, 255, 0);
              Color c3 = id(timer_menu_index) == 3 ? Color(255, 255, 255) : Color(0, 255, 0);
              if (id(timer_menu_index) == 0) draw_pacman_menu(40); it.print(30, 40, id(font_tiny), c0, TextAlign::TOP_LEFT, "WEITER");
              if (id(timer_menu_index) == 1) draw_pacman_menu(60); it.print(30, 60, id(font_tiny), c1, TextAlign::TOP_LEFT, "NEU STELLEN");
              if (id(timer_menu_index) == 2) draw_pacman_menu(80); it.print(30, 80, id(font_tiny), c2, TextAlign::TOP_LEFT, "ABBRECHEN");
              if (id(timer_menu_index) == 3) draw_pacman_menu(100); it.print(30, 100, id(font_tiny), c3, TextAlign::TOP_LEFT, "ZURUECK");
            } else {
              Color c[5];
              for(int i=0; i<5; i++) c[i] = id(timer_menu_index) == i ? Color(255,255,255) : Color(0,255,0);
              if (id(timer_menu_index) == 0) draw_pacman_menu(35); it.print(30, 35, id(font_tiny), c[0], TextAlign::TOP_LEFT, "NEU STELLEN");
              if (id(timer_menu_index) == 1) draw_pacman_menu(55); it.printf(30, 55, id(font_tiny), c[1], "%02d:%02d LADEN", id(timer_hist_1)/60, id(timer_hist_1)%60);
              if (id(timer_menu_index) == 2) draw_pacman_menu(75); it.printf(30, 75, id(font_tiny), c[2], "%02d:%02d LADEN", id(timer_hist_2)/60, id(timer_hist_2)%60);
              if (id(timer_menu_index) == 3) draw_pacman_menu(95); it.printf(30, 95, id(font_tiny), c[3], "%02d:%02d LADEN", id(timer_hist_3)/60, id(timer_hist_3)%60);
              if (id(timer_menu_index) == 4) draw_pacman_menu(115); it.print(30, 115, id(font_tiny), c[4], TextAlign::TOP_LEFT, "ZURUECK");
            }
          } else {
            int m = id(timer_sekunden) / 60;
            int s = id(timer_sekunden) % 60;
            Color clr = Color(255, 255, 255);
            std::string status = "STANDBY";
            if (id(timer_show_alarm)) { clr = Color(255, 0, 0); status = "TIME OVER"; }
            else if (id(timer_einstell_modus)) { clr = Color(255, 255, 0); status = "INSERT COIN"; }
            else if (id(timer_aktiv)) { clr = Color(0, 255, 0); status = "PLAYER 1 START"; }
            else if (!id(timer_aktiv) && id(timer_sekunden) > 0) { clr = Color(255, 0, 0); status = "PAUSED"; }
            
            it.printf(64, 65, id(font_uhr), clr, TextAlign::CENTER, "%02d:%02d", m, s);
            
            if (!id(timer_aktiv) && id(timer_sekunden) > 0 && ((id(anim_tick)/5)%2 == 0)) {
            } else {
               it.print(64, 105, id(font_tiny), clr, TextAlign::CENTER, status.c_str());
            }
          }

          if (!id(timer_dimmed) && (id(timer_sekunden) > 0 || id(timer_aktiv))) {
            int p = (id(pac_tick) * 4) % 512;
            int px, py, dir; 
            
            if (p < 112) { px = 8 + p; py = 8; dir = 0; }
            else if (p < 256) { px = 120; py = 8 + (p - 112); dir = 1; }
            else if (p < 368) { px = 120 - (p - 256); py = 152; dir = 2; }
            else { px = 8; py = 152 - (p - 368); dir = 3; }

            for (int i = 0; i < 512; i += 32) {
                if (i > p) {
                    int dx, dy;
                    if (i < 112) { dx = 8 + i; dy = 8; }
                    else if (i < 256) { dx = 120; dy = 8 + (i - 112); }
                    else if (i < 368) { dx = 120 - (i - 256); dy = 152; }
                    else { dx = 8; dy = 152 - (i - 368); }

                    if (i == 160 || i == 416) {
                        it.filled_circle(dx, dy, 2, Color(255, 0, 0));
                        it.line(dx, dy, dx+3, dy-3, Color(0, 255, 0)); 
                    } else {
                        it.filled_rectangle(dx-1, dy-1, 2, 2, Color(255, 200, 0));
                    }
                }
            }

            bool mouth_open = (id(pac_tick) / 2) % 2 == 0;
            it.filled_circle(px, py, 6, Color(255, 255, 0));
            if (mouth_open) {
               if(dir==0) it.filled_triangle(px, py, px+8, py-6, px+8, py+6, Color(0,0,0));
               if(dir==1) it.filled_triangle(px, py, px-6, py+8, px+6, py+8, Color(0,0,0));
               if(dir==2) it.filled_triangle(px, py, px-8, py-6, px-8, py+6, Color(0,0,0));
               if(dir==3) it.filled_triangle(px, py, px-6, py-8, px+6, py-8, Color(0,0,0));
            }
          }

      - id: page_aktionen
        lambda: |-
          it.fill(Color(0, 0, 0));
          
          it.rectangle(0, 0, 128, 160, Color(255, 0, 0));
          it.rectangle(2, 2, 124, 156, Color(255, 0, 0));
          
          it.print(64, 10, id(font_normal), Color(255, 255, 0), TextAlign::TOP_CENTER, "ACTION MENU");

          auto draw_ship = [&](int x, int y, Color c) {
              it.filled_rectangle(x, y-2, 2, 4, c);
              it.filled_rectangle(x+2, y-4, 2, 8, c);
              it.filled_rectangle(x+4, y-6, 4, 12, c);
              it.filled_rectangle(x+8, y-2, 2, 4, c);
          };

          const char* actions[5] = {"KINOABEND", "ALLES AUS", "SCHREIBTISCH", "NACHTLICHT", "ZURUECK"};
          for(int i=0; i<5; i++) {
            int y = 45 + (i * 16);
            if(id(aktion_index) == i) {
              draw_ship(14, y + 6, Color(255, 255, 0));
              
              Color blink_color = ((id(anim_tick) / 3) % 2 == 0) ? Color(255, 255, 0) : Color(255, 255, 255);
              it.print(32, y, id(font_tiny), blink_color, TextAlign::TOP_LEFT, actions[i]);
            } else {
              it.print(32, y, id(font_tiny), Color(0, 255, 0), TextAlign::TOP_LEFT, actions[i]);
            }
          }

binary_sensor:
  - platform: gpio
    pin: {number: 27, mode: {input: true, pullup: true}, inverted: true}
    id: encoder_button
    on_multi_click:
      - timing:
          - ON for at most 300ms
          - OFF for at most 300ms
          - ON for at most 300ms
        then:
          - if:
              condition: { lambda: 'return id(red_alarm_active);' }
              then:
                - lambda: 'id(red_alarm_active) = false; id(idle_sekunden) = 0; id(log_view_index) = 0; id(timer_dimmed) = false;'
                - script.stop: play_red_alarm
                - rtttl.stop:
                    id: melody_player
                - display.page.show: page_nachrichten
                - if:
                    condition: { lambda: 'return !id(display_leuchtet);' }
                    then:
                      - if:
                          condition: { lambda: 'return id(switch_nachtmodus).state;' }
                          then: { light.turn_on: {id: display_licht, brightness: !lambda 'return id(nachtmodus_helligkeit) / 100.0f;'} }
                          else: { light.turn_on: {id: display_licht, brightness: 100%} }
              else:
                - if:
                    condition: { lambda: 'return !id(display_leuchtet) || id(timer_dimmed);' }
                    then:
                      - lambda: 'id(idle_sekunden) = 0; id(timer_dimmed) = false;'
                      - if:
                          condition: { lambda: 'return id(switch_nachtmodus).state;' }
                          then: { light.turn_on: {id: display_licht, brightness: !lambda 'return id(nachtmodus_helligkeit) / 100.0f;'} }
                          else: { light.turn_on: {id: display_licht, brightness: 100%} }
                    else:
                      - lambda: 'id(idle_sekunden) = 0; id(nav_menu_aktiv) = true; id(nav_menu_index) = 0;'
                      - display.page.show: page_nav
      - timing:
          - ON for at most 300ms
          - OFF for at least 300ms
        then:
          - if:
              condition: { lambda: 'return id(red_alarm_active);' }
              then:
                - lambda: 'id(red_alarm_active) = false; id(idle_sekunden) = 0; id(log_view_index) = 0; id(timer_dimmed) = false;'
                - script.stop: play_red_alarm
                - rtttl.stop:
                    id: melody_player
                - display.page.show: page_nachrichten
                - if:
                    condition: { lambda: 'return !id(display_leuchtet);' }
                    then:
                      - if:
                          condition: { lambda: 'return id(switch_nachtmodus).state;' }
                          then: { light.turn_on: {id: display_licht, brightness: !lambda 'return id(nachtmodus_helligkeit) / 100.0f;'} }
                          else: { light.turn_on: {id: display_licht, brightness: 100%} }
              else:
                - if:
                    condition: { lambda: 'return !id(display_leuchtet) || id(timer_dimmed);' }
                    then:
                      - lambda: 'id(idle_sekunden) = 0; id(timer_dimmed) = false;'
                      - if:
                          condition: { lambda: 'return id(switch_nachtmodus).state;' }
                          then: { light.turn_on: {id: display_licht, brightness: !lambda 'return id(nachtmodus_helligkeit) / 100.0f;'} }
                          else: { light.turn_on: {id: display_licht, brightness: 100%} }
                    else:
                      - lambda: 'id(idle_sekunden) = 0;'
                      - if:
                          condition:
                            lambda: 'return id(timer_show_alarm);'
                          then:
                            - lambda: |-
                                id(timer_show_alarm) = false;
                                id(timer_sekunden) = 0;
                            - script.stop: timer_alarm_sound
                            - display.page.show: page_home
                          else:
                            - if:
                                condition:
                                  lambda: 'return id(nav_menu_aktiv);'
                                then:
                                  - lambda: 'id(nav_menu_aktiv) = false;'
                                  - if:
                                      condition: { lambda: 'return id(nav_menu_index) == 0;' }
                                      then: { display.page.show: page_home }
                                  - if:
                                      condition: { lambda: 'return id(nav_menu_index) == 1;' }
                                      then: 
                                        - lambda: 'id(log_view_index) = 0;'
                                        - display.page.show: page_nachrichten
                                  - if:
                                      condition: { lambda: 'return id(nav_menu_index) == 2;' }
                                      then: 
                                        - lambda: 'id(stats_view_index) = 0;'
                                        - display.page.show: page_sensoren
                                  - if:
                                      condition: { lambda: 'return id(nav_menu_index) == 3;' }
                                      then: { display.page.show: page_timer }
                                  - if:
                                      condition: { lambda: 'return id(nav_menu_index) == 4;' }
                                      then: 
                                        - lambda: 'id(aktion_index) = 0;'
                                        - display.page.show: page_aktionen
                                  - if:
                                      condition: { lambda: 'return id(nav_menu_index) == 5;' }
                                      then: 
                                        - display.page.show: page_settings
                                        - lambda: 'id(settings_menu_aktiv) = true; id(settings_menu_index) = 0;'
                                  - if:
                                      condition: { lambda: 'return id(nav_menu_index) == 6;' }
                                      then: { display.page.show: page_home }
                                else:
                                  - if:
                                      condition:
                                        lambda: 'return id(tft_display).get_active_page() == id(page_home);'
                                      then:
                                        - display.page.show: page_nav
                                        - lambda: 'id(nav_menu_aktiv) = true; id(nav_menu_index) = 0;'
                                  - if:
                                      condition:
                                        lambda: 'return id(tft_display).get_active_page() == id(page_sysinfo);'
                                      then:
                                        - display.page.show: page_settings
                                        - lambda: 'id(settings_menu_aktiv) = true; id(settings_menu_index) = 4;'
                                  - if:
                                      condition:
                                        lambda: 'return id(tft_display).get_active_page() == id(page_settings);'
                                      then:
                                        - lambda: |-
                                            if (id(settings_menu_index) == 0) {
                                              id(switch_sound).toggle();
                                            } else if (id(settings_menu_index) == 1) {
                                              id(einstell_timeout_modus) = !id(einstell_timeout_modus);
                                            } else if (id(settings_menu_index) == 2) {
                                              id(switch_nachtmodus).toggle();
                                            } else if (id(settings_menu_index) == 3) {
                                              id(einstell_night_brt_modus) = !id(einstell_night_brt_modus);
                                            } else if (id(settings_menu_index) == 4) {
                                              id(settings_menu_aktiv) = false;
                                              id(tft_display).show_page(id(page_sysinfo));
                                            } else if (id(settings_menu_index) == 5) {
                                              id(settings_menu_aktiv) = false;
                                              id(einstell_timeout_modus) = false;
                                              id(einstell_night_brt_modus) = false;
                                              id(tft_display).show_page(id(page_nav));
                                              id(nav_menu_aktiv) = true;
                                            }
                                  - if:
                                      condition:
                                        lambda: 'return id(tft_display).get_active_page() == id(page_timer);'
                                      then:
                                        - lambda: |-
                                            if (id(timer_menu_modus)) {
                                              id(timer_menu_modus) = false;
                                              if (id(timer_sekunden) > 0) {
                                                if (id(timer_menu_index) == 0) {
                                                  id(timer_aktiv) = true;
                                                } else if (id(timer_menu_index) == 1) {
                                                  id(timer_aktiv) = false;
                                                  id(timer_einstell_modus) = true;
                                                } else if (id(timer_menu_index) == 2) {
                                                  id(timer_aktiv) = false;
                                                  id(timer_sekunden) = 0;
                                                } else if (id(timer_menu_index) == 3) {
                                                  id(tft_display).show_page(id(page_nav));
                                                  id(nav_menu_aktiv) = true;
                                                  id(nav_menu_index) = 3;
                                                }
                                              } else {
                                                if (id(timer_menu_index) == 0) {
                                                  id(timer_einstell_modus) = true;
                                                } else if (id(timer_menu_index) >= 1 && id(timer_menu_index) <= 3) {
                                                  int val = 0;
                                                  if (id(timer_menu_index) == 1) val = id(timer_hist_1);
                                                  if (id(timer_menu_index) == 2) val = id(timer_hist_2);
                                                  if (id(timer_menu_index) == 3) val = id(timer_hist_3);
                                                  
                                                  id(timer_sekunden) = val;
                                                  id(timer_aktiv) = true;
                                                  
                                                  if (val != id(timer_hist_1)) {
                                                    if (val != id(timer_hist_2)) id(timer_hist_3) = id(timer_hist_2);
                                                    id(timer_hist_2) = id(timer_hist_1);
                                                    id(timer_hist_1) = val;
                                                  }
                                                } else if (id(timer_menu_index) == 4) {
                                                  id(tft_display).show_page(id(page_nav));
                                                  id(nav_menu_aktiv) = true;
                                                  id(nav_menu_index) = 3;
                                                }
                                              }
                                            } else if (id(timer_einstell_modus)) {
                                              id(timer_einstell_modus) = false;
                                              if (id(timer_sekunden) > 0) {
                                                id(timer_aktiv) = true;
                                                int new_val = id(timer_sekunden);
                                                if (new_val != id(timer_hist_1)) {
                                                  if (new_val != id(timer_hist_2)) id(timer_hist_3) = id(timer_hist_2);
                                                  id(timer_hist_2) = id(timer_hist_1);
                                                  id(timer_hist_1) = new_val;
                                                }
                                              }
                                            } else if (id(timer_aktiv)) {
                                              id(timer_aktiv) = false;
                                            } else if (!id(timer_aktiv) && id(timer_sekunden) > 0) {
                                              id(timer_menu_modus) = true;
                                              id(timer_menu_index) = 0;
                                            } else {
                                              id(timer_menu_modus) = true;
                                              id(timer_menu_index) = 0;
                                            }
                                  - if:
                                      condition:
                                        lambda: 'return id(tft_display).get_active_page() == id(page_aktionen);'
                                      then:
                                        - if:
                                            condition: { lambda: 'return id(aktion_index) == 0;' }
                                            then: { homeassistant.event: { event: esphome.aktion_kinoabend } }
                                        - if:
                                            condition: { lambda: 'return id(aktion_index) == 1;' }
                                            then: { homeassistant.event: { event: esphome.aktion_alles_aus } }
                                        - if:
                                            condition: { lambda: 'return id(aktion_index) == 2;' }
                                            then: { homeassistant.event: { event: esphome.aktion_schreibtischlicht } }
                                        - if:
                                            condition: { lambda: 'return id(aktion_index) == 3;' }
                                            then: { homeassistant.event: { event: esphome.aktion_nachtlicht } }
                                        - if:
                                            condition: { lambda: 'return id(aktion_index) == 4;' }
                                            then: 
                                              - display.page.show: page_nav
                                              - lambda: 'id(nav_menu_aktiv) = true; id(nav_menu_index) = 4;'
                                        
                                        - if:
                                            condition: { lambda: 'return id(aktion_index) != 4;' }
                                            then: { display.page.show: page_home }
                                  - if:
                                      condition:
                                        lambda: 'return id(tft_display).get_active_page() == id(page_nachrichten) || id(tft_display).get_active_page() == id(page_sensoren);'
                                      then:
                                        - if:
                                            condition: { lambda: 'return id(switch_nachtmodus).state;' }
                                            then: { light.turn_on: {id: display_licht, brightness: !lambda 'return id(nachtmodus_helligkeit) / 100.0f;'} }
                                            else: { light.turn_on: {id: display_licht, brightness: 100%} }
                                        - if:
                                            condition: {lambda: 'return id(frage_aktiv);'}
                                            then:
                                              - homeassistant.event: {event: esphome.frage_antwort, data: {antwort: "true"}}
                                              - lambda: 'id(frage_aktiv) = false;'
                                              - display.page.show: page_home
                                            else:
                                              - display.page.show: page_home

interval:
  - interval: 1s
    then:
      - lambda: |-
          if (id(display_timeout_sekunden) > 0 && id(display_leuchtet) && !id(red_alarm_active)) {
            id(idle_sekunden)++;
            if (id(idle_sekunden) >= id(display_timeout_sekunden)) {
              if (id(tft_display).get_active_page() == id(page_timer) && (id(timer_aktiv) || id(timer_sekunden) > 0)) {
                if (!id(timer_dimmed)) {
                  id(timer_dimmed) = true;
                  auto call = id(display_licht)->turn_on();
                  float brt = id(switch_nachtmodus).state ? (id(nachtmodus_helligkeit) / 100.0f) : 1.0f;
                  call.set_brightness(brt * 0.5f);
                  call.perform();
                }
              } else {
                auto call = id(display_licht)->turn_off();
                call.perform();
              }
            }
          }
          if (id(timer_aktiv) && id(timer_sekunden) > 0) {
            id(timer_sekunden)--;
            if (id(timer_sekunden) == 0) {
              id(timer_aktiv) = false;
              id(timer_show_alarm) = true;
              if(id(timer_dimmed)) {
                id(timer_dimmed) = false;
              }
              id(timer_alarm_sound).execute();
            }
          }
      - if:
          condition:
            lambda: 'return id(timer_show_alarm);'
          then:
            - display.page.show: page_timer
            - if:
                condition: { lambda: 'return id(switch_nachtmodus).state;' }
                then: { light.turn_on: {id: display_licht, brightness: !lambda 'return id(nachtmodus_helligkeit) / 100.0f;'} }
                else: { light.turn_on: {id: display_licht, brightness: 100%} }

  - interval: 60s
    then:
      - if:
          condition:
            lambda: 'return !id(timer_aktiv) && !id(timer_einstell_modus) && id(timer_sekunden) == 0 && !id(timer_show_alarm) && !id(nav_menu_aktiv) && !id(settings_menu_aktiv) && id(tft_display).get_active_page() != id(page_aktionen) && !id(red_alarm_active);'
          then:
            - lambda: 'if(id(timer_dimmed)) id(timer_dimmed) = false;'
            - display.page.show: page_home

  - interval: 100ms
    then:
      - lambda: |-
          id(anim_tick)++;
          if (id(timer_aktiv)) {
            id(pac_tick)++;
          }

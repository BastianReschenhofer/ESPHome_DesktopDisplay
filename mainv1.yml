          std::string msg = "KEINE NACHRICHTEN";
          
          if (id(history_raw_msg).size() > 0) {
            clr = id(history_clr)[id(log_view_index)];
            msg = id(history_raw_msg)[id(log_view_index)];
          }
          
          if(clr == "rot") bc = Color(255, 0, 0);
          else if(clr == "gelb") bc = Color(255, 255, 0);
          else if(clr == "gruen") bc = Color(0, 255, 0);
          

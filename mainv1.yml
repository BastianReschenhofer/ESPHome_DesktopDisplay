          it.print(14, 40, id(font_tiny), Color(255, 255, 255), TextAlign::TOP_LEFT, "WIFI SIGNAL:");
          
          if (id(wlan_starke).has_state()) {
              float sig = id(wlan_starke).state;
              it.printf(14, 55, id(font_medium), Color(0, 255, 255), "%.0f dBm", sig);
              
              int bars = (sig + 100) / 10;
              if (bars < 0) bars = 0; 
              if (bars > 5) bars = 5;
              
              for (int i = 0; i < 5; i++) {
                  Color bar_color = (i < bars) ? Color(0, 255, 0) : Color(50, 50, 50);
                  it.filled_rectangle(14 + (i * 12), 95 - (i * 5), 8, 5 + (i * 5), bar_color);
              }
          } else {
              it.print(14, 55, id(font_medium), Color(255, 0, 0), TextAlign::TOP_LEFT, "OFFLINE");
          }

          if ((id(anim_tick) / 4) % 2 == 0) {
             it.print(64, 135, id(font_tiny), Color(255, 0, 0), TextAlign::TOP_CENTER, "PRESS TO RETURN");
          }

      - id: page_nachrichten

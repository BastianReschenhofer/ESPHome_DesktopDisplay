          if ((id(anim_tick) / 5) % 2 == 0) {
            it.rectangle(2, 2, 124, 156, bc);
            it.rectangle(4, 4, 120, 152, bc);
          } else {
            it.rectangle(3, 3, 122, 154, bc);
          }
          
          it.filled_rectangle(10, 10, 108, 18, bc);
          Color text_color = (clr == "gelb" || clr == "gruen") ? Color(0,0,0) : Color(255,255,255);
          
          if (id(history_raw_msg).size() > 0) {
            it.printf(64, 12, id(font_normal), text_color, TextAlign::TOP_CENTER, "MSG %d/%d", id(log_view_index) + 1, id(history_raw_msg).size());
          } else {
            it.print(64, 12, id(font_normal), text_color, TextAlign::TOP_CENTER, "LOGS");
          }
          
